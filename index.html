<!DOCTYPE html>
<html>
<head>
<title>Harshit Chemical Industry</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#004aad;color:white;text-align:center;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:15px}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card img{width:100%;height:220px;object-fit:cover}
.card h3{text-align:center}
.card p{text-align:center;color:red;font-weight:bold}
</style>
</head>
<body>

<header>
<h1>Harshit Chemical Industry</h1>
<p>Quality Cleaning Products</p>
</header>

<div class="products">

<div class="card">
<img src="images/FB_IMG_1784054889549.jpg">
<h3>Room Spray</h3>
<p>₹120 / 250ml</p>
</div>

<div class="card">
<img src="images/FB_IMG_1784054900382.jpg">
<h3>Car Wash Shampoo</h3>
<p>₹250 / 500ml</p>
</div>

<div class="card">
<img src="images/FB_IMG_1784054905325.jpg">
<h3>Carpet Shampoo</h3>
<p>₹100 / 250ml</p>
</div>

<div class="card">
<img src="images/FB_IMG_1784054910348.jpg">
<h3>Hard Spot Cleaner</h3>
<p>₹80 / 500ml</p>
</div>

</div>

</body>
</html>
