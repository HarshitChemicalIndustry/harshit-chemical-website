<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fa;
    color:#333;
}

header{
    background:linear-gradient(90deg,#004aad,#0077ff);
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:32px;
}

header p{
    margin-top:8px;
    font-size:16px;
}

.banner{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.section-title{
    text-align:center;
    margin:25px 0 15px;
    font-size:28px;
    color:#004aad;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    padding:0 15px 30px;
}

.product-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-5px);
}

.product-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.product-info{
    padding:15px;
    text-align:center;
}

.product-info h3{
    font-size:18px;
    margin-bottom:8px;
}

.price{
    color:#e53935;
    font-size:20px;
    font-weight:bold;
}

.contact{
    background:#004aad;
    color:white;
    text-align:center;
    padding:25px 15px;
}

.contact h2{
    margin-bottom:10px;
}

.whatsapp{
    display:inline-block;
    margin-top:15px;
    background:#25D366;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>Harshit Chemical Industry</h1>
    <p>Quality Cleaning Products & Housekeeping Solutions</p>
</header>

<img src="images/FB_IMG_1784054889549.jpg" class="banner" alt="Banner">

            <h3>Room Spray</h3>
            <p class="price">₹120 / 250ml</p>
        </div>
    </div>

        <img src="images/FB_IMG_1784054900382.jpg" alt="Car Wash Shampoo">
        <div class="product-info">
            <h3>Car Wash Shampoo</h3>
            <p class="price">₹250 / 500ml</p>
        </div>
    </div>
