<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
h1{
    background:#004aad;
    color:#fff;
    text-align:center;
    padding:20px;
    margin:0;
}
.section{
    padding:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}
.card{
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    overflow:hidden;
    text-align:center;
}
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}
.card h3{
    margin:10px 0;
}
.price{
    color:#e60000;
    font-size:20px;
    font-weight:bold;
    padding-bottom:15px;
}
</style>
</head>

<body>

<h1>Harshit Chemical Industry</h1>

<section class="section">
<div class="grid">

<div class="card">
<img src="images/FB_IMG_1784054900382.jpg">
<h3>Dish Wash 250ml</h3>
<div class="price">₹52</div>
</div>

<div class="card">
<img src="images/FB_IMG_1784054905325.jpg">
<h3>Dish Wash 500ml</h3>
<div class="price">₹95</div>
</div>

<div class="card">
<img src="images/FB_IMG_1784054910348.jpg">
<h3>Dish Wash 1 Litre</h3>
<div class="price">₹185</div>
</div>

<div class="card">
<img src="images/FB_IMG_1784054889549.jpg">
<h3>Premium Dish Wash</h3>
<div class="price">₹250</div>
</div>

</div>
</section>

</body>
</html>
