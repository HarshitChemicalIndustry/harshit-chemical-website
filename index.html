<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#f5f5f5;
    color:#333;
}
header{
    background:linear-gradient(90deg,#004aad,#0077ff);
    color:white;
    text-align:center;
    padding:25px 15px;
}
header h1{
    font-size:32px;
}
header p{
    margin-top:8px;
    font-size:16px;
}
.hero{
    background:white;
    text-align:center;
    padding:30px 20px;
}
.hero h2{
    color:#004aad;
    margin-bottom:10px;
}
.hero p{
    max-width:700px;
    margin:auto;
    line-height:1.6;
}
.section-title{
    text-align:center;
    color:#004aad;
    margin:25px 0 15px;
    font-size:28px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    padding:0 15px 30px;
}
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover{
    transform:translateY(-5px);
}
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}
.card-content{
    padding:15px;
    text-align:center;
}
.card-content h3{
    margin-bottom:8px;
}
.price{
    color:#e53935;
    font-size:20px;
    font-weight:bold;
}
.tools-gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:0 15px 30px;
}

    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    background:white;
}
.contact{
    background:#004aad;
    color:white;
    text-align:center;
    padding:30px 20px;
}
.contact h2{
    margin-bottom:10px;
}
