<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}
header{
    background:#004aad;
    color:white;
    text-align:center;
    padding:20px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}
.card h3{
    text-align:center;
    margin:10px 0;
}
.card p{
    text-align:center;
    color:#e53935;
    font-weight:bold;
    margin-bottom:15px;
}
footer{
    background:#004aad;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>
<body>

<header>
    <h1>Harshit Chemical Industry</h1>
    <p>Quality Cleaning Products</p>
</header>

<section class="products">

    <div class="card">
        <img src="images/FB_IMG_1784054889549.jpg" alt="">
        <h3>Room Spray</h3>
        <p>₹120 / 250ml</p>
    </div>

    <div class="card">
        <img src="images/FB_IMG_1784054900382.jpg" alt="">
        <h3>Car Wash Shampoo</h3>
        <p>₹250 / 500ml</p>
    </div>

    <div class="card">
        <img src="images/FB_IMG_1784054905325.jpg" alt="">
        <h3>Carpet Shampoo</h3>
        <p>₹100 / 250ml</p>
    </div>

    <div class="card">
        <img src="images/FB_IMG_1784054910348.jpg" alt="">
        <h3>Hard Spot Cleaner</h3>
        <p>₹80 / 500ml</p>
    </div>

</section>

<footer>
    Harshit Chemical Industry
</footer>

</body>
</html>
