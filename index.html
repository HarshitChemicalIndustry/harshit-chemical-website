<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f1f3f6;
}

header{
    background:#2874f0;
    color:#fff;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:1000;
}

header h2{
    font-size:22px;
}

.search-box{
    background:#fff;
    padding:12px;
}

.search-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.banner{
    background:#0059c9;
    color:#fff;
    text-align:center;
    padding:25px 10px;
    font-size:18px;
    font-weight:bold;
}

.products{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
}

.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:12px;
    text-align:center;
}

.card h3{
    font-size:17px;
    margin-bottom:6px;
}

.price{
    color:#2874f0;
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.btn{
    width:100%;
    border:none;
    padding:10px;
    border-radius:8px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:6px;
}

.cart-btn{
    background:#ff9f00;
    color:#fff;
}

.buy-btn{
    background:#fb641b;
    color:#fff;
}

.contact{
    background:#fff;
    margin:12px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.contact h3{
    margin-bottom:10px;
}

.contact p{
    margin-bottom:6px;
}

.cart-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    padding:12px 15px;
    box-shadow:0 -2px 8px rgba(0,0,0,0.15);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

.checkout{
    background:#25D366;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
    margin-bottom:70px;
}
</style>
</head>

<body>

<header>
    <h2>Harshit Chemical Industry</h2>
</header>

<div class="search-box">
    <input type="text" placeholder="Search products...">
</div>

<div class="banner">
    Professional Cleaning Solutions
</div>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59?w=400" alt="Room Spray">
        <div class="card-content">
            <h3>Room Spray</h3>
            <div class="price">₹120</div>
            <button class="btn cart-btn" onclick="addToCart(120)">Add to Cart</button>
            <button class="btn buy-btn" onclick="buyNow('Room Spray',120)">Buy Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400" alt="Car Wash Shampoo">
        <div class="card-content">
            <h3>Car Wash Shampoo</h3>
            <div class="price">₹250</div>
            <button class="btn cart-btn" onclick="addToCart(250)">Add to Cart</button>
            <button class="btn buy-btn" onclick="buyNow('Car Wash Shampoo',250)">Buy Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?w=400" alt="Carpet Shampoo">
        <div class="card-content">
            <h3>Carpet Shampoo</h3>
            <div class="price">₹100</div>
            <button class="btn cart-btn" onclick="addToCart(100)">Add to Cart</button>
            <button class="btn buy-btn" onclick="buyNow('Carpet Shampoo',100)">Buy Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1581578017093-cd30fce4eeb7?w=400" alt="Hard Spot Cleaner">
        <div class="card-content">
            <h3>Hard Spot Cleaner</h3>
            <div class="price">₹80</div>
            <button class="btn cart-btn" onclick="addToCart(80)">Add to Cart</button>
            <button class="btn buy-btn" onclick="buyNow('Hard Spot Cleaner',80)">Buy Now</button>
        </div>
    </div>

</div>

<div class="contact">
    <h3>Contact Us</h3>
    <p><strong>Phone:</strong> 9691865574</p>
    <p><strong>Address:</strong> Kilagate, Gwalior, Madhya Pradesh</p>
</div>

<div class="cart-bar">
    <span>Cart Total: ₹<span id="total">0</span></span>
    <a class="checkout" href="https://wa.me/919691865574">Checkout</a>
</div>

<footer>
    © 2026 Harshit Chemical Industry
</footer>

<script>
let total = 0;

function addToCart(price){
    total += price;
    document.getElementById('total').innerText = total;
}

function buyNow(product,price){
    let msg = `Hello, I want to order ${product} for ₹${price}`;
    window.location.href = `https://wa.me/919691865574?text=${encodeURIComponent(msg)}`;
}
</script>

</body>
</html>
