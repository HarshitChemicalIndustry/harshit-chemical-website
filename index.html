<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    color:#333;
}

header{
    background:#0b4d8c;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:30px;
}

.hero{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:50px 20px;
}

.hero h2{
    font-size:36px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
}

.products{
    padding:40px 20px;
}

.products h2{
    text-align:center;
    margin-bottom:30px;
    color:#0b4d8c;
    font-size:32px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.product-card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.product-card h3{
    text-align:center;
    padding:15px;
    color:#0b4d8c;
}

footer{
    background:#072f57;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>Harshit Chemical Industry</h1>
</header>

<section class="hero">
    <h2>Professional Cleaning Solutions</h2>
    <p>Quality Chemical & Housekeeping Products</p>
</section>

<section class="products">
    <h2>Our Products</h2>

    <div class="product-grid">

        <div class="product-card">
            <img src="https://raw.githubusercontent.com/HarshitChemicalIndustry/harshit-chemical-website/main/images/FB_IMG_1784054889549.jpg" alt="Room Spray">
            <h3>Room Spray</h3>
        </div>

        <div class="product-card">
            <img src="https://raw.githubusercontent.com/HarshitChemicalIndustry/harshit-chemical-website/main/images/FB_IMG_1784054900382.jpg" alt="Car Wash Shampoo">
            <h3>Car Wash Shampoo</h3>
        </div>

        <div class="product-card">
            <img src="https://raw.githubusercontent.com/HarshitChemicalIndustry/harshit-chemical-website/main/images/FB_IMG_1784054905325.jpg" alt="Carpet Shampoo">
            <h3>Carpet Shampoo</h3>
        </div>

        <div class="product-card">
            <img src="https://raw.githubusercontent.com/HarshitChemicalIndustry/harshit-chemical-website/main/images/FB_IMG_1784054910348.jpg" alt="Hard Spot Cleaner">
            <h3>Hard Spot Cleaner</h3>
        </div>

    </div>
</section>

<footer>
    © 2026 Harshit Chemical Industry | All Rights Reserved
</footer>

</body>
</html>
