<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f1f3f6;}
header{background:#2874f0;color:#fff;padding:15px;text-align:center;}
.search{background:#fff;padding:12px;}
.search input{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;}
.banner{background:#0059c9;color:#fff;text-align:center;padding:20px;font-weight:bold;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.image-box{height:140px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:50px;}
.content{padding:12px;text-align:center;}
.price{color:#2874f0;font-size:20px;font-weight:bold;margin:8px 0;}
.btn{width:100%;border:none;padding:10px;border-radius:8px;font-weight:bold;margin-top:6px;cursor:pointer;}
.cart{background:#ff9f00;color:#fff;}
.buy{background:#fb641b;color:#fff;}
.contact{background:#fff;margin:12px;padding:15px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -2px 8px rgba(0,0,0,0.15);}
.checkout{background:#25D366;color:#fff;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:bold;}
footer{text-align:center;padding:20px;color:#666;margin-bottom:70px;}
</style>
</head>

<body>

<header>
<h2>Harshit Chemical Industry</h2>
</header>

<div class="search">
<input type="text" placeholder="Search products...">
</div>

<div class="banner">
Professional Cleaning Solutions
</div>

<div class="products">

<div class="card">
<div class="image-box">🌹</div>
<div class="content">
<h3>Room Spray</h3>
<div class="price">₹120</div>
<button class="btn cart" onclick="addToCart(120)">Add to Cart</button>
<button class="btn buy" onclick="buyNow('Room Spray',120)">Buy Now</button>
</div>
</div>

<div class="card">
<div class="image-box">🚗</div>
<div class="content">
<h3>Car Wash Shampoo</h3>
<div class="price">₹250</div>
<button class="btn cart" onclick="addToCart(250)">Add to Cart</button>
<button class="btn buy" onclick="buyNow('Car Wash Shampoo',250)">Buy Now</button>
</div>
</div>

<div class="card">
<div class="image-box">🧽</div>
<div class="content">
<h3>Carpet Shampoo</h3>
<div class="price">₹100</div>
<button class="btn cart" onclick="addToCart(100)">Add to Cart</button>
<button class="btn buy" onclick="buyNow('Carpet Shampoo',100)">Buy Now</button>
</div>
</div>

<div class="card">
<div class="image-box">✨</div>
<div class="content">
<h3>Hard Spot Cleaner</h3>
<div class="price">₹80</div>
<button class="btn cart" onclick="addToCart(80)">Add to Cart</button>
<button class="btn buy" onclick="buyNow('Hard Spot Cleaner',80)">Buy Now</button>
</div>
</div>

</div>

<div class="contact">
<h3>Contact Us</h3>
<p><strong>Phone:</strong> 9691865574</p>
<p><strong>Address:</strong> Kilagate, Gwalior, Madhya Pradesh</p>
</div>

<div class="bottom">
<span>Cart Total: ₹<span id="total">0</span></span>
<a class="checkout" href="https://wa.me/919691865574">Checkout</a>
</div>

<footer>
© 2026 Harshit Chemical Industry
</footer>

<script>
let total = 0;
function addToCart(price){
total += price;
document.getElementById('total').innerText = total;
}
function buyNow(product,price){
let msg = `Hello, I want to order ${product} for ₹${price}`;
window.location.href = `https://wa.me/919691865574?text=${encodeURIComponent(msg)}`;
}
</script>

</body>
</html>
