<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshit Chemical Industry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    background:linear-gradient(90deg,#004aad,#0077ff);
    color:white;
    text-align:center;
    padding:25px 15px;
}

header h1{
    font-size:32px;
}

header p{
    margin-top:8px;
    font-size:16px;
}

.section-title{
    text-align:center;
    color:#004aad;
    margin:25px 0 15px;
    font-size:28px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    padding:0 15px 30px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:12px;
    background:white;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.contact{
    background:#004aad;
    color:white;
    text-align:center;
    padding:25px 15px;
}

.contact a{
    display:inline-block;
    margin-top:15px;
    background:#25D366;
    color:white;
    padding:12px 24px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>Harshit Chemical Industry</h1>
    <p>Chemical Products & Housekeeping Tools</p>
</header>

<h2 class="section-title">Product Gallery</h2>

<div class="gallery">

    <img src="images/images/FB_IMG_1784054889549.jpg" alt="Room Spray">

    <img src="images/images/FB_IMG_1784054900382.jpg" alt="Car Wash Shampoo">

    <img src="images/images/FB_IMG_1784054905325.jpg" alt="Carpet Shampoo">

    <img src="images/images/FB_IMG_1784054910348.jpg" alt="Hard Spot Cleaner">

</div>

<section class="contact">
    <h2>Contact Us</h2>
    <p>Harshit Chemical Industry</p>
    <a href="https://wa.me/919999999999">WhatsApp Now</a>
</section>

</body>
</html>
